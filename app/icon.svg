  <!-- Bar 2: thin -->
  <rect x="210" y="152" width="30" height="208" rx="10" fill="#F5F5F3"/>
  <!-- Bar 3: medium-wide -->
  <rect x="262" y="152" width="60" height="208" rx="12" fill="#F5F5F3"/>
  <!-- Bar 4: thin -->
  <rect x="344" y="152" width="34" height="208" rx="10" fill="#F5F5F3"/>
  <!-- Bar 5: widest — gold accent -->
  <rect x="400" y="152" width="76" height="208" rx="14" fill="#FFD60A"/>
